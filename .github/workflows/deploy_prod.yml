name: Deploy to Production

on:
  push:
    branches:
      - prod

jobs:
  deploy:
    # Allow this job to run up to 5 hours (300 minutes)
    timeout-minutes: 300
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Debug SSH Connection
        run: |
          echo "${{ secrets.PROD_SSH_KEY }}" > key.pem
          chmod 600 key.pem
          ssh -o StrictHostKeyChecking=no -i key.pem \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            "echo 'SSH connection successful'"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.PROD_HOST }}
          username: arrows            # use 'arrows' user instead of root
          key: ${{ secrets.PROD_SSH_KEY }}
          password: ${{ secrets.PROD_SSH_PASSWORD }}
          # Allow SSH action up to 5 hours
          timeout: 5h
          # Allow remote commands up to 5 hours
          command_timeout: 5h
          script: |
            # Navigate to project directory
            cd /home/arrows/SoftwareArrows

            # Clone repository if missing, otherwise reset to 'prod'
            if [ ! -d ".git" ]; then
              git clone git@github.com:SoftwareArrows/SoftwareArrows.git .
            else
              git fetch origin prod
              git reset --hard origin/prod
            fi

            # Export Redis password and rebuild containers
            export REDIS_PASSWORD=${{ secrets.PROD_REDIS_PASSWORD }}
            docker compose up -d --build
