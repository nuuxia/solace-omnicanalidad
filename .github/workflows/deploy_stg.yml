name: Deploy to Staging

on:
  push:
    branches:
      - stg

jobs:
  deploy:
    # Allow this job to run up to 5 hours (300 minutes)
    timeout-minutes: 300
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Debug SSH Connection
        run: |
          echo "${{ secrets.STG_SSH_KEY }}" > key.pem
          chmod 600 key.pem
          ssh -o StrictHostKeyChecking=no -i key.pem \
            ${{ secrets.STG_USER }}@${{ secrets.STG_HOST }} \
            "echo 'SSH connection successful'"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.STG_HOST }}
          username: arrows
          key: ${{ secrets.STG_SSH_KEY }}
          # Allow SSH action up to 5 hours
          timeout: 5h
          # Allow remote commands up to 5 hours
          command_timeout: 5h
          script: |
            # Navigate to project directory
            cd /home/arrows/SoftwareArrows

            # Clone repository if missing, otherwise reset to 'stg'
            if [ ! -d ".git" ]; then
              git clone git@github.com:SoftwareArrows/SoftwareArrows.git .
            else
              git fetch origin stg
              git reset --hard origin/stg
            fi

            # Export Redis password and rebuild containers
            export REDIS_PASSWORD=${{ secrets.STG_REDIS_PASSWORD }}
            docker compose up -d --build
